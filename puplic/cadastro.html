<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../assets/style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>


    <main>
        <div class="cadastro">
            <h2 id="titulo">Cadastro </h2>
            <p id="sub_titulo">Preencha os dados abaixo para realizar o registro no sistema.</p>
    
            <form class="row g-3">
                <div class="col-6">
                    <label for="inputname" class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" id="nome">
                </div>
    
    
                <div class="col-6">
                    <label for="inputcpf" class="form-label">CPF</label>
                    <input type="text" class="form-control" id="cpf">
                </div>
    
    
                <div class="col-4">
                    <label for="inputdtnascimento" class="form-label">Data de Nascimento</label>
                    <input type="date" class="form-control" id="dt_nascimento">
                </div>
    
    
                <div class="col-4">
                    <label for="inputtelefone" class="form-label">Telefone</label>
                    <input type="tel" class="form-control" id="telefone">
                </div>
    
    
                <div class="col-4">
                    <label for="inputemail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email">
                </div>
    
                <div class="col-6">
                    <label for="inputsenha" class="form-label">Senha</label>
                    <input type="text" class="form-control" id="senha">
                </div>
    
                <div class="col-6">
                    <label for="inputconfirmasenha" class="form-label">Confirmar Senha</label>
                    <input type="text" class="form-control" id="confirma_senha">
                </div>
    
                <button type="submit">Cadastre-se</button>
        
            </form>
        </div>
    
    </main>
    
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>
</html>
