<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/style/style.css">
</head>

<body id="fixed">

    <div class="d-flex">

        <!-- MENU -->
        <aside class="sidebar p-4">

            <h3 class="mb-5">
                <i class="fa-solid fa-train text-warning"></i>
                Bem-Vindo Administrador!
            </h3>

            <ul class="list-unstyled">

                <li class="menu active">
                    <i class="fa-solid fa-house"></i>
                    Dashboard
                </li>

                <li class="menu">
                    <i class="fa-solid fa-users"></i>
                    Usuários
                </li>

                <li class="menu">
                    <i class="fa-solid fa-train-subway"></i>
                    Locomotivas
                </li>

                <li class="menu">
                    <i class="fa-solid fa-location-dot"></i>
                    Viagens
                </li>

                <li class="menu">
                    <i class="fa-solid fa-gear"></i>
                    Configurações
                </li>

            </ul>

        </aside>

        <!-- CONTEÚDO -->
        <main class="main p-4">

            <!-- TOPO -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <h1>Dashboard</h1>

                <input type="text" class="form-control w-25" placeholder="Buscar...">

            </div>

            <!-- CARDS -->
            <div class="row g-4 mb-4">

                <div class="col-md-6">
                    <div class="card-box">
                        <i class="fa-solid fa-train fs-2 text-warning"></i>

                        <div>
                            <h3>24</h3>
                            <p>Locomotivas</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card-box">
                        <i class="fa-solid fa-location-dot fs-2 text-warning"></i>

                        <div>
                            <h3>18</h3>
                            <p>Viagens</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card-box">
                        <i class="fa-solid fa-dollar-sign fs-2 text-warning"></i>

                        <div>
                            <h3>R$12 mil</h3>
                            <p>Faturamento</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card-box">
                        <i class="fa-solid fa-screwdriver-wrench fs-2 text-warning"></i>

                        <div>
                            <h3>7</h3>
                            <p>Manutenções</p>
                        </div>
                    </div>
                </div>

                <div>

                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d228988.54673061252!2d-48.9628813!3d-26.263414550000004!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94dea3f39db1ab37%3A0xbc4b989df161e9fa!2sJoinville%20-%20SC!5e0!3m2!1spt-BR!2sbr!4v1778162894361!5m2!1spt-BR!2sbr"
                        width="600" height="450" style="border:0; width: 100%;" allowfullscreen="" loading="lazy">
                    </iframe>

                </div>

            </div>


        </main>

    </div>

</body>

</html>
